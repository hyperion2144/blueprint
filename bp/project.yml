# specwf project configuration
# Generated by specwf init — 2026-06-29

version: 1

# 多平台配置 — CLI 为每个平台生成对应的 slash commands + skills + agent 定义
platform:
  - omp
  # - claude-code  # Phase 2 支持

# 工作流严格度 — 三档 profile 聚合常见配置组合
# lite:     无 plan-checker、单 review、TDD 可选、change 串行
# standard: plan-checker、三重 review、TDD(type:behavior)、依赖图并行
# strict:   全部 TDD、人工门控每步、change 串行
profile: standard

# 项目上下文注入 — 所有步骤的 agent 都会看到这段
context: |
  项目: specwf — 规格驱动开发工作流
  技术栈: TypeScript, Node.js
  测试: Vitest
  CLI 框架: 待定（research 阶段确定）
  参考项目:
    - OpenSpec (MIT) — CLI 架构、change 结构、delta-spec 机制
    - GSD Core (MIT) — milestone/phase 层级、并行执行、fresh-context 子代理
    - Trellis (AGPL-3.0) — spec 注入、代码认知回灌（仅参考概念，不拷代码）
  语言: 中文

# 工作流 toggles (absent = enabled 模式，缺失默认 true)
workflow:
  research: true          # 项目级技术调研
  plan_check: true        # plan-checker 验证
  tdd: true               # TDD 强制（type:behavior 走 RED→GREEN→REFACTOR）
  triple_review: true     # 三重 review（规格/质量/目标）
  auto_advance: true      # /specwf:continue 自动推进
  spec_injection: true    # spec 自动注入到每步

# review 门控
review:
  gate: all-pass          # all-pass（全通过才进 verify）| severity | report-only
  parallel: true          # 三重 review batch 并行

# change 并行策略
change:
  parallel: dependency-graph  # serial | dependency-graph | pipeline
  isolation: true              # OMP task isolated 模式

# git 配置
git:
  branching: none         # none | phase | milestone
  create_tag: true        # milestone ship 时打 tag

# conventions 自动注入
conventions:
  inject: true

# 模型配置 — profile 自动填充默认值，用户可按步骤角色覆盖
# 角色映射到 OMP modelRoles（slow/default/smol），不硬编码模型 ID
#
# profile → 模型角色映射:
#   lite:     research=default  plan=default  execute=default  review=default  verify=default  archive=smol
#   standard: research=slow     plan=slow     execute=default  review=slow     verify=default  archive=default
#   strict:   research=slow:high plan=slow:high execute=slow   review=slow:high verify=slow    archive=default
#
# 覆盖示例:
#   models:
#     execute: anthropic/claude-sonnet-4-5
#     research: anthropic/claude-opus-4-5:high
models: {}
