name: publish
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        run: |
          git fetch --tags origin 2>/dev/null || true
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "$PREV_TAG"..HEAD --pretty=format:'%s' --no-merges)
          else
            COMMITS=$(git log --pretty=format:'%s' --no-merges $(git rev-list --max-parents=0 HEAD)..HEAD)
          fi
          FEATS=""; FIXES=""; REFACTORS=""; CHORES=""
          while IFS= read -r line; do
            case "$line" in
              "feat"*) FEATS="$FEATS- ${line#feat: }"$'\n' ;;
              "fix"*)  FIXES="$FIXES- ${line#fix: }"$'\n' ;;
              "refactor"*) REFACTORS="$REFACTORS- ${line#refactor: }"$'\n' ;;
              *)       CHORES="$CHORES- $line"$'\n' ;;
            esac
          done <<< "$COMMITS"
          NOTES=""
          [ -n "$FEATS" ] && NOTES="${NOTES}### Features\n${FEATS}\n"
          [ -n "$FIXES" ] && NOTES="${NOTES}### Bug Fixes\n${FIXES}\n"
          [ -n "$REFACTORS" ] && NOTES="${NOTES}### Refactoring\n${REFACTORS}\n"
          [ -n "$CHORES" ] && NOTES="${NOTES}### Other\n${CHORES}\n"
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release edit "${{ github.ref_name }}" --notes "$NOTES"
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "$NOTES"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
