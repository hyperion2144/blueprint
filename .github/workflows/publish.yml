name: publish
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        run: |
          git fetch --tags origin 2>/dev/null || true
          PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')
          if [ -n "$PREV_TAG" ]; then
            LOG_CMD="git log \"$PREV_TAG\"..HEAD --pretty=format:'---%n%s%n%-b' --no-merges"
          else
            LOG_CMD="git log --pretty=format:'---%n%s%n%-b' --no-merges $(git rev-list --max-parents=0 HEAD)..HEAD"
          fi
          COMMITS=$(eval "$LOG_CMD")
          FEATS=""; FIXES=""; REFACTORS=""; CHORES=""
          CURRENT=""
          while IFS= read -r line; do
            if [ "$line" = "---" ]; then
              if [ -n "$CURRENT" ]; then
                TITLE="${CURRENT%%$'\n'*}"
                BODY="${CURRENT#*$'\n'}"
                [ "$TITLE" = "$BODY" ] && BODY=""
                case "$TITLE" in
                  "feat:"*) ENTRY="- ${TITLE#feat: }"; [ -n "$BODY" ] && ENTRY="$ENTRY"$'\n'"$(echo "$BODY" | sed 's/^/  /')"; FEATS="$FEATS$ENTRY"$'\n' ;;
                  "fix:"*)  ENTRY="- ${TITLE#fix: }"; [ -n "$BODY" ] && ENTRY="$ENTRY"$'\n'"$(echo "$BODY" | sed 's/^/  /')"; FIXES="$FIXES$ENTRY"$'\n' ;;
                  "refactor:"*) ENTRY="- ${TITLE#refactor: }"; [ -n "$BODY" ] && ENTRY="$ENTRY"$'\n'"$(echo "$BODY" | sed 's/^/  /')"; REFACTORS="$REFACTORS$ENTRY"$'\n' ;;
                  *) ENTRY="- $TITLE"; [ -n "$BODY" ] && ENTRY="$ENTRY"$'\n'"$(echo "$BODY" | sed 's/^/  /')"; CHORES="$CHORES$ENTRY"$'\n' ;;
                esac
              fi
              CURRENT=""
            else
              [ -z "$CURRENT" ] && CURRENT="$line" || CURRENT="$CURRENT"$'\n'"$line"
            fi
          done <<< "$COMMITS"
          NOTES=""
          [ -n "$FEATS" ] && NOTES="${NOTES}### Features\n${FEATS}\n"
          [ -n "$FIXES" ] && NOTES="${NOTES}### Bug Fixes\n${FIXES}\n"
          [ -n "$REFACTORS" ] && NOTES="${NOTES}### Refactoring\n${REFACTORS}\n"
          [ -n "$CHORES" ] && NOTES="${NOTES}### Other\n${CHORES}\n"
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release edit "${{ github.ref_name }}" --notes "$NOTES"
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "$NOTES"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
