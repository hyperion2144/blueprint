name: publish
on:
  push:
    tags:
      - "v*"
jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        run: |
          git fetch --tags origin 2>/dev/null || true
          PREV_TAG=$(git tag --sort=-version:refname | grep -v 'v0.0.0' | tail -1)
          [ -z "$PREV_TAG" ] && PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          NOTES=$(git log "${PREV_TAG}..HEAD" --no-merges --format='---%n%n**%s**%n%-b' \
            | awk -F': ' '
              /^---$/ { in_block=0; next }
              /^\\*\\*/ {
                msg=$0; sub(/^\\*\\*/, "", msg); sub(/\\*\\*$/, "", msg)
                if (msg ~ /^feat/) { cat="F"; desc=substr(msg, index(msg, ":")+2) }
                else if (msg ~ /^fix/) { cat="X"; desc=substr(msg, index(msg, ":")+2) }
                else if (msg ~ /^refactor/) { cat="R"; desc=substr(msg, index(msg, ":")+2) }
                else { cat="O"; desc=msg }
                in_block=1
                entry[cat]=entry[cat] "- " desc "\n"
                next
              }
              /./ && in_block { gsub(/^[[:space:]]*/, "  "); entry[cat]=entry[cat] $0 "\n" }
              END {
                if (entry["F"]) printf "### Features\n" entry["F"] "\n"
                if (entry["X"]) printf "### Bug Fixes\n" entry["X"] "\n"
                if (entry["R"]) printf "### Refactoring\n" entry["R"] "\n"
                if (entry["O"]) printf "### Other\n" entry["O"] "\n"
              }')
          if gh release view "${{ github.ref_name }}" &>/dev/null; then
            gh release edit "${{ github.ref_name }}" --notes "$NOTES"
          else
            gh release create "${{ github.ref_name }}" --title "${{ github.ref_name }}" --notes "$NOTES"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
